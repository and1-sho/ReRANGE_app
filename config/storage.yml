# ============================================================
# ファイル保存先の設定ファイル（Active Storage）
#
# ユーザーがアップロードした動画・画像をどこに保存するかを環境ごとに定義する。
# production.rb の config.active_storage.service で
# ここで定義した名前（:local や :cloudflare_r2 など）を指定して切り替える。
# ============================================================

# テスト環境：テストが終わったら消えていい一時フォルダに保存する
test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

# 開発環境：自分のPCの storage/ フォルダに保存する
local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# 本番環境：Cloudflare R2（クラウドのファイル置き場）に保存する
#
# R2 は Amazon S3 と同じ仕組みで動くため、Rails の S3 設定をそのまま使える。
# 各 ENV["..."] は Render の「環境変数」画面で設定する値。
# コードに直接キーを書くと GitHub に漏れるリスクがあるため、環境変数経由で渡す。
#
# ・CLOUDFLARE_R2_ACCESS_KEY_ID     → R2 の「アクセスキーID」
# ・CLOUDFLARE_R2_SECRET_ACCESS_KEY → R2 の「シークレットアクセスキー」
# ・CLOUDFLARE_R2_ENDPOINT          → R2 の「エンドポイント URL」（R2 管理画面で確認できる）
# ・CLOUDFLARE_R2_BUCKET            → R2 で作成した「バケット名」
cloudflare_r2:
  service: S3
  access_key_id: <%= ENV["CLOUDFLARE_R2_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["CLOUDFLARE_R2_SECRET_ACCESS_KEY"] %>
  region: auto
  endpoint: <%= ENV["CLOUDFLARE_R2_ENDPOINT"] %>
  bucket: <%= ENV["CLOUDFLARE_R2_BUCKET"] %>
  force_path_style: true
